<style>
:root {
  --pure:    #FFFFFF;
  --mist:    #F2F4F7;
  --moonlit: #DCE3EB;
  --smoky:   #A7B4C6;
  --slate:   #6B7C93;
  --ink:     #3a4a5c;
  --accent:  #8fa8c4;
  --pale-b:  #EAF2FF;
  --lavender:#EDE7FA;
  --gold:    #c8b89a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--mist);font-family:'Noto Sans KR',sans-serif;color:var(--ink);overflow-x:hidden;}

/* ── PARTICLES ── */
#snow-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7;}

/* ── PAGE SYSTEM ── */
.page{display:none;min-height:100vh;position:relative;z-index:1;}
.page.active{display:block;}

/* ════════════════════════════════
   INTRO
════════════════════════════════ */
#page-intro{
  background: linear-gradient(160deg, #f8fafc 0%, #e8eef5 40%, #d8e4f0 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; text-align:center; padding:102px 20px 40px;
  position:relative; overflow:hidden;
}
#page-intro.active{display:flex;}

/* misty overlay */
#page-intro::before{
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 20%, rgba(220,227,235,.6) 0%, transparent 60%),
              radial-gradient(ellipse at 75% 80%, rgba(234,242,255,.5) 0%, transparent 55%);
  pointer-events:none;
}

.intro-ornament{
  font-size:12px; letter-spacing:5px; color:var(--slate); text-transform:uppercase;
  margin-bottom:28px; font-weight:400;
  display:flex; align-items:center; gap:14px;
}
.intro-ornament::before,.intro-ornament::after{
  content:''; display:block; width:60px; height:1px;
  background:linear-gradient(90deg,transparent,var(--smoky),transparent);
}

.intro-logo-wrap{
  width:120px; height:120px; border-radius:50%; margin:0 auto 28px;
  background:linear-gradient(135deg,#ffffff,#dce8f5);
  border:1.5px solid rgba(167,180,198,.4);
  box-shadow: 0 8px 40px rgba(107,124,147,.12), 0 0 0 8px rgba(220,227,235,.35);
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.intro-logo-wrap::before{
  content:'🦢'; font-size:42px; filter:drop-shadow(0 2px 8px rgba(107,124,147,.2));
}

.intro-tag{
  font-size:12px; letter-spacing:5px; color:var(--slate); font-weight:400; margin-bottom:14px;
}
.intro-title{
  font-family:'Gowun Batang',serif; font-size:clamp(34px,6vw,54px); font-weight:700;
  color:var(--ink); line-height:1.25; margin-bottom:12px;
  letter-spacing:-1px;
}
.intro-subtitle{
  font-family:'Noto Serif KR',serif; font-size:15px; color:var(--slate); font-weight:400;
  letter-spacing:2px; margin-bottom:48px;
}

.intro-divider{
  width:200px; height:1px; margin:0 auto 44px;
  background:linear-gradient(90deg,transparent,var(--moonlit),var(--smoky),var(--moonlit),transparent);
  position:relative;
}
.intro-divider::before{
  content:'✦'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:var(--smoky); font-size:10px; background:var(--mist); padding:0 6px;
}

.menu-cards{
  display:flex; gap:20px; flex-wrap:wrap; justify-content:center; margin-bottom:48px;
}
.menu-card{
  width:200px; padding:32px 20px 28px;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(167,180,198,.25);
  border-radius:20px; cursor:pointer; text-align:center;
  backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(107,124,147,.08);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden;
}
.menu-card::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.6),transparent);
  border-radius:20px;
}
.menu-card:hover{
  transform:translateY(-8px);
  box-shadow:0 16px 48px rgba(107,124,147,.15);
  border-color:rgba(143,168,196,.4);
}
.menu-card-icon{font-size:40px;margin-bottom:14px;display:block;filter:drop-shadow(0 2px 6px rgba(107,124,147,.15));}
.menu-card-title{
  font-family:'Noto Serif KR',serif; font-size:17px; font-weight:600;
  color:var(--ink); margin-bottom:8px; position:relative;
}
.menu-card-desc{font-size:13px;color:var(--slate);line-height:1.8;position:relative;}
.menu-card-line{
  width:30px;height:1px;margin:10px auto 0;
  background:linear-gradient(90deg,transparent,var(--moonlit),transparent);
}

.intro-foot{font-size:12px;color:var(--slate);letter-spacing:3px;font-weight:400;}

/* ════════════════════════════════
   SHARED LAYOUT
════════════════════════════════ */
.sub-page{
  background:linear-gradient(160deg,#f8fafc 0%,#e8eef5 50%,#dce8f5 100%);
  min-height:100vh; padding:0 0 60px;
  position:relative; overflow-y:auto; overflow-x:hidden;
}
.sub-page.active{display:block;}

/* top bar */
.sub-topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 32px 0; position:relative; z-index:10;
}
.back-btn{
  display:flex; align-items:center; gap:8px; cursor:pointer;
  font-size:12px; color:var(--smoky); letter-spacing:1px;
  padding:8px 18px; border-radius:20px;
  border:1px solid rgba(167,180,198,.3);
  background:rgba(255,255,255,.6); backdrop-filter:blur(8px);
  transition:all .2s;
}
.back-btn:hover{color:var(--slate);border-color:var(--smoky);}
.back-btn svg{width:13px;height:13px;}

.topbar-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-family:'Noto Serif KR',serif; font-size:15px; font-weight:500;
  color:var(--slate); letter-spacing:2px;
}
.topbar-right{width:80px;}

/* section title */
.section-head{
  text-align:center; padding:28px 20px 20px;
}
.section-orn{
  font-size:11px;letter-spacing:5px;color:var(--slate);text-transform:uppercase;
  margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:12px;
}
.section-orn::before,.section-orn::after{
  content:''; display:block; width:40px; height:1px;
  background:linear-gradient(90deg,transparent,var(--smoky));
}
.section-orn::after{background:linear-gradient(90deg,var(--smoky),transparent);}
.section-title-main{
  font-family:'Gowun Batang',serif; font-size:clamp(22px,4vw,30px); font-weight:700;
  color:var(--ink); letter-spacing:-0.5px;
}

/* ════════════════════════════════
   LADDER PAGE
════════════════════════════════ */
#page-ladder{}

/* ── TIER ROW: 4개 나란히, 높이 통일 ── */
.tier-row{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:16px;
  padding:0 28px;
  /* 19개 아이템 × 32px행 + 헤더(~130px) */
  grid-auto-rows: minmax(740px, auto);
  align-items: stretch;
}

/* 모든 카드: 동일한 높이, 스크롤 없이 전부 표시 */
.tier-card{
  background:rgba(255,255,255,.62);
  border:1.5px solid rgba(167,180,198,.22);
  border-radius:20px;
  padding:22px 18px 20px;
  cursor:pointer; position:relative;
  backdrop-filter:blur(14px);
  box-shadow:0 4px 20px rgba(107,124,147,.06);
  transition:border-color .3s, box-shadow .3s, opacity .3s, filter .3s, transform .35s cubic-bezier(.34,1.56,.64,1);
  display:flex; flex-direction:column;
  min-height:0;
  height:100%;      /* 그리드 행 높이 꽉 채움 */
}
.tier-card::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.5),transparent);
  border-radius:20px; pointer-events:none;
}
.tier-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 36px rgba(107,124,147,.13);
  border-color:rgba(143,168,196,.38);
}

/* 포커스 카드 */
.tier-card.focused{
  background:rgba(255,255,255,.97);
  border-color:var(--accent);
  border-width:2px;
  box-shadow:0 18px 52px rgba(107,124,147,.18), 0 0 0 4px rgba(143,168,196,.13);
  transform:translateY(-6px);
  z-index:5;
}

/* 나머지 카드 흐리게 */
.tier-row.has-focus .tier-card:not(.focused){
  opacity:.45;
  filter:saturate(.6);
}

/* 숫자 */
.tier-num{
  font-family:'Gowun Batang',serif;
  font-size:34px; font-weight:700;
  color:var(--ink); line-height:1;
  text-align:center;
  margin-bottom:2px;
  flex-shrink:0;
  transition:all .3s;
}
.tier-card.focused .tier-num{ color:var(--slate); }

.tier-star{
  font-size:10px; color:var(--slate); letter-spacing:3px;
  text-align:center; margin-bottom:8px; flex-shrink:0;
}

.tier-rule-badge{
  display:block; text-align:center;
  padding:5px 10px; border-radius:20px;
  font-size:11.5px; font-weight:500; letter-spacing:.6px;
  background:rgba(167,180,198,.12); color:var(--slate);
  border:1px solid rgba(167,180,198,.28);
  margin-bottom:10px;
  flex-shrink:0;
  transition:all .3s;
}
.tier-card.focused .tier-rule-badge{
  background:rgba(143,168,196,.18); color:var(--ink);
  border-color:var(--accent);
}

/* 목록 구분선 */
.tier-list-divider{
  width:100%; height:1px; margin-bottom:8px; flex-shrink:0;
  background:linear-gradient(90deg,transparent,rgba(167,180,198,.4),transparent);
}

/* 전체 목록: flex 나머지 공간 채움, 스크롤 없음 */
.tier-items-list{
  flex:1;
  display:flex; flex-direction:column;
  overflow:hidden;       /* 스크롤 없음 */
  min-height:0;
}

/* 아이템 행: flex로 균등 분배 */
.tier-item-row{
  flex:1;
  display:flex; align-items:center; gap:6px;
  padding:0 8px;
  border-bottom:1px solid rgba(167,180,198,.1);
  transition:background .15s, color .15s;
  min-height:28px;   /* 최소 행 높이 보장 */
}
.tier-item-row:last-child{ border-bottom:none; }

.tier-item-dot{
  width:3px; height:3px; border-radius:50%; flex-shrink:0;
  background:rgba(167,180,198,.45);
  transition:background .15s;
}

/* 아이템 텍스트 */
.tier-item-text{
  font-size:12px; color:var(--slate); line-height:1.45;
  transition:color .15s, font-size .2s;
  flex:1;
  word-break:keep-all;
}

/* 포커스 카드 목록 */
.tier-card.focused .tier-item-row{
  border-bottom-color:rgba(167,180,198,.13);
}
.tier-card.focused .tier-item-text{
  font-size:13px;
  color:var(--ink);
}
.tier-card.focused .tier-item-dot{ background:var(--accent); }
.tier-card.focused .tier-item-row:hover{
  background:rgba(143,168,196,.08);
  border-radius:6px;
}
.tier-card.focused .tier-item-row:hover .tier-item-text{ color:var(--slate); }

/* expanded tier panel — tier-row 바로 아래 full width */
.tier-expanded{
  margin:20px 28px 28px;
  background:rgba(255,255,255,.88);
  border:1.5px solid rgba(143,168,196,.3);
  border-radius:20px;
  padding:32px 32px 28px;
  backdrop-filter:blur(16px);
  box-shadow:0 8px 40px rgba(107,124,147,.12);
  display:none;
}
.tier-expanded.visible{display:block;}
.exp-header{
  display:flex; align-items:baseline; gap:12px; margin-bottom:20px;
}
.exp-num{
  font-family:'Gowun Batang',serif; font-size:48px; font-weight:700; color:var(--ink); line-height:1;
}
.exp-rule{
  font-size:12px; color:var(--smoky); letter-spacing:2px;
}
.exp-divider{width:100%;height:1px;background:linear-gradient(90deg,var(--moonlit),transparent);margin-bottom:20px;}

/* step tabs */
.step-tabs{display:flex;gap:0;margin-bottom:20px;}
.step-tab{
  flex:1; padding:10px; text-align:center;
  font-size:12px; letter-spacing:1px; color:var(--smoky);
  border-bottom:2px solid var(--moonlit); cursor:pointer;
  transition:all .2s; font-family:'Noto Serif KR',serif;
}
.step-tab.active{color:var(--slate);border-bottom-color:var(--slate);}
.step-tab.done{color:var(--accent);border-bottom-color:var(--accent);}

/* items grid */
.items-section{margin-bottom:20px;}
.items-grid{
  display:grid; gap:8px;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
}
.item-chip{
  padding:12px 15px; border-radius:12px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(167,180,198,.2);
  font-size:13px; color:var(--ink); cursor:pointer;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  position:relative; line-height:1.5;
  font-family:'Noto Sans KR',sans-serif;
}
.item-chip:hover{
  transform:translateY(-3px);
  border-color:rgba(143,168,196,.4);
  box-shadow:0 6px 18px rgba(107,124,147,.1);
}
.item-chip.selected{
  background:rgba(143,168,196,.15);
  border-color:var(--accent);
  color:var(--slate);
}
.item-chip.selected::after{
  content:'✓'; position:absolute; top:5px; right:8px;
  font-size:9px; color:var(--accent);
}

/* penalty grid */
.penalty-grid{
  display:grid; gap:8px;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
}
.penalty-chip{
  padding:11px 14px; border-radius:12px;
  background:rgba(255,255,255,.6);
  border:1px solid rgba(167,180,198,.2);
  font-size:13px; color:var(--ink); cursor:pointer;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  display:flex; align-items:center; gap:8px;
}
.penalty-chip:hover{border-color:rgba(143,168,196,.4);transform:translateY(-2px);}
.penalty-chip.selected{
  background:rgba(200,184,154,.12);
  border-color:var(--gold);
  color:var(--slate);
}
.p-icon{font-size:16px;flex-shrink:0;}

/* sel count */
.sel-status{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; font-size:12px; color:var(--smoky);
}
.sel-status span{color:var(--slate);font-weight:500;}

/* cta row */
.cta-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:20px;}
.btn-ghost{
  padding:10px 24px; border-radius:50px; cursor:pointer;
  border:1px solid rgba(167,180,198,.35); background:transparent;
  font-size:12px; color:var(--smoky); letter-spacing:.5px;
  font-family:'Noto Sans KR',sans-serif;
  transition:all .2s;
}
.btn-ghost:hover{border-color:var(--smoky);color:var(--slate);}
.btn-primary{
  padding:11px 32px; border-radius:50px; cursor:pointer;
  background:linear-gradient(135deg,var(--slate),var(--accent));
  border:none; color:#fff; font-size:13px; font-weight:500;
  letter-spacing:.5px; font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 16px rgba(107,124,147,.25);
  transition:all .25s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(107,124,147,.3);}

/* ── MODAL OVERLAY & BOX ── */
.modal-overlay{
  position:fixed; inset:0; z-index:2000;
  background:rgba(30,40,55,.55); backdrop-filter:blur(14px);
  display:flex; align-items:flex-start; justify-content:center;
  padding-top:48px;
  opacity:0; pointer-events:none;
  transition:opacity .3s;
}
.modal-overlay.open{ opacity:1; pointer-events:all; }

.modal-box{
  background:linear-gradient(160deg,#f8fafc 0%,#eaf0f7 100%);
  border:1.5px solid rgba(143,168,196,.3);
  border-radius:24px;
  padding:40px 36px 32px;
  width:min(680px,94vw); max-height:calc(100vh - 72px);
  overflow-y:auto;
  box-shadow:0 8px 60px rgba(30,40,55,.22), 0 0 0 1px rgba(255,255,255,.6) inset;
  /* 위에서 내려오는 애니메이션 */
  transform:translateY(-28px) scale(.98);
  transition:transform .38s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.modal-overlay.open .modal-box{ transform:translateY(0) scale(1); }

/* X 닫기 버튼 — 우측 상단 고정, 눈에 잘 띄게 */
.modal-close{
  position:absolute; top:14px; right:16px;
  width:34px; height:34px; border-radius:50%;
  background:rgba(167,180,198,.15);
  border:1px solid rgba(167,180,198,.28);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; color:var(--slate);
  transition:all .2s; line-height:1;
}
.modal-close:hover{
  background:rgba(107,124,147,.15);
  color:var(--ink);
  transform:rotate(90deg);
}

.modal-title{
  font-family:'Gowun Batang',serif; font-size:22px; font-weight:700;
  color:var(--ink); margin-bottom:6px; text-align:center;
}
.modal-sub{font-size:13px;color:var(--slate);text-align:center;letter-spacing:.5px;margin-bottom:20px;}

/* number picker row */
.num-row{
  display:flex; gap:10px; justify-content:center; margin-bottom:24px; flex-wrap:wrap;
}
.num-ball{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.8);
  border:1.5px solid rgba(167,180,198,.3);
  display:flex;align-items:center;justify-content:center;
  font-family:'Gowun Batang',serif;font-size:20px;font-weight:700;color:var(--ink);
  cursor:pointer;
  box-shadow:0 4px 14px rgba(107,124,147,.1);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
.num-ball:hover{transform:scale(1.1);box-shadow:0 8px 24px rgba(107,124,147,.18);}
.num-ball.picked{
  background:linear-gradient(135deg,#dce8f5,#c8d8ec);
  border-color:var(--accent);
  color:var(--slate);
  box-shadow:0 0 0 3px rgba(143,168,196,.2), 0 8px 24px rgba(107,124,147,.15);
  transform:scale(1.12);
}

#ladder-canvas{display:block;margin:0 auto 20px;border-radius:12px;max-width:100%;}

/* result reveal */
.result-wrap{
  background:rgba(255,255,255,.7); border:1px solid rgba(167,180,198,.3);
  border-radius:16px; padding:20px; text-align:center; margin-bottom:18px;
}
.result-label{font-size:11px;letter-spacing:3px;color:var(--slate);margin-bottom:8px;text-transform:uppercase;}
.result-text{
  font-family:'Gowun Batang',serif; font-size:26px; font-weight:700;
  color:var(--ink);
}
.result-text span{color:var(--slate);}

/* ── LADDER MODAL 전용 ── */
.lm-pick-desc{
  text-align:center; font-size:12px; color:var(--smoky);
  letter-spacing:1px; margin-bottom:18px;
}

/* 선택한 번호 강조 */
.num-ball.picked{
  background:linear-gradient(135deg,#dce8f5,#c8d8ec);
  border-color:var(--accent);
  color:var(--slate);
  box-shadow:0 0 0 3px rgba(143,168,196,.2), 0 8px 24px rgba(107,124,147,.15);
  transform:scale(1.15);
}

/* 상품 미리보기 */
.lm-items-preview{
  display:flex; flex-wrap:wrap; gap:8px;
  justify-content:center; margin-top:20px;
}
.lm-item-tag{
  padding:7px 16px; border-radius:20px;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(167,180,198,.3);
  font-size:12px; color:var(--ink);
  font-family:'Noto Serif KR',serif;
  box-shadow:0 2px 8px rgba(107,124,147,.07);
}

/* 도전 버튼 */
.lm-start-btn{

  {keyword:"공주",text:"여봐라~ 귀엽고 사랑스러운 공주님이 납시었다!\n공주님이 왔으니 어서 반겨야 하지 않겠느냐~ 어흠!\n오늘 공주님 기분이 좋으려면 오빠의 관심이 필요하도다♥\n초코우유도 좋고, 마카롱도 좋고, 칭찬은 더 좋으니라.\n뭐? 아무것도 준비 안 했다고? 그럼 공주님 똑땅해ㅠㅠ\n공주님 체면이 있어서 먼저 안아달라고는 못 하겠지만…\n사실은 오빠가 먼저 안아줬으면 좋겠느니라 ><\n공주님도 좋아하는 사람 앞에서는 부끄러워진단 말이야.\n어서 이리 와서 공주님 마음을 달래거라~ 쪽♥"},
  {keyword:"토끼",text:"깡충깡충~ 오빠한테 달려왔쪄요♥\n토끼가 오늘도 오빠 보고 싶어서 귀 쫑긋 세우고 기다렸어요.\n오빠 목소리 들리면 귀가 자동으로 쫑긋쫑긋한단 말이에요~\n당근도 좋지만 오늘은 오빠 관심이 더 좋아요 ><\n오빠가 나 안 봐주면 토끼 귀 축 처질지도 몰라요ㅠㅠ\n그러니까 빨리 귀엽다고 해줘요. 세상에서 제일 귀엽다고요!\n나 오빠 주변에서 깡충깡충 맴돌면서 안 떨어질 거예요♥\n도망가면 안 대요. 토끼 생각보다 빠르단 말이에요.\n오빠는 토끼가 콕 찍었으니까 오늘부터 내꼬예요~ 쪽♥"},
  {keyword:"초코우유",text:"오빠아~ 나 초코우유 마시구 시퍼요오~ ><\n그냥 우유 말구우~ 달달한 초코우유여야 대요!\n오늘은 기분이 달달해지고 싶은 날이란 말이에요♥\n오빠가 사주는 초코우유면 더 맛있을 것 같아요.\n안 사주면 나 입 삐죽하고 한동안 말 안 할지도 몰라요ㅠㅠ\n근데 오빠가 \"자, 여기\" 하고 주면 바로 풀릴 수 있어요.\n초코우유 쪽쪽 마시면서 오빠 옆에 딱 붙어있을래요♥\n한 입 줄까아? 안 대~ 이건 내꼬야! 히히.\n대신 오빠는 내가 따랑해줄게요. 초코우유보다 더 달달하게♥"},
  {keyword:"마카롱",text:"오빠아~ 오늘은 마카롱 먹고 싶은 날이에요오♥\n알록달록 예쁜 거 있자나~ 나처럼 귀여운 거어 ><\n딸기맛도 좋구 초코맛도 좋구 바닐라맛도 좋아요.\n근데 오빠가 골라주는 맛이면 뭐든 제일 맛있을 것 같아요♥\n나 마카롱 한입 먹으면 기분 좋아져서 애교 더 잘할 수 이쪄요!\n안 사주면 볼 빵빵하게 하고 오빠 쳐다볼 거예요ㅠㅠ\n\"왜 안 사줘…\" 하면서 똑땅한 표정 지을 거예요.\n그래도 오빠가 하나만 사주면 바로 방긋할게요.\n히히~ 오빠가 사주면 하트 백 개 날려줄게요♥♥♥"},
  {keyword:"단팥빵",text:"오빠… 나 단팥빵 먹고 시퍼요…\n겉은 폭신폭신하구 안에는 달달한 팥 들어있는 거어♥\n생각만 해도 마음이 따뜻해지는 맛이잖아요.\n나 지금 배고파서 애교도 힘이 안 나요잉ㅠㅠ\n단팥빵 하나만 사주면 바로 기운 차릴 수 이쪄요!\n오빠가 직접 골라준 단팥빵이면 더 맛있을 것 같아요.\n한입 먹고 \"오빠 최고\"라고 말해줄 자신 있어요 ><\n혹시 오빠가 먹여주면 나 부끄러워서 눈 못 볼지도 몰라요.\n아앙~ 해줘요오~ 나 기다리구 있쟈나요♥"},
  {keyword:"슈크림빵",text:"슈크림빵 사주떼여~ 슈크림 가득 들어있는 걸루요♥\n한입 베어물면 크림이 뿅 나오자나요~ 그거 너무 조아 ><\n나도 오빠한테 애교가 뿅뿅 나오고 있어요.\n근데 슈크림빵이 없으면 애교 충전이 조금 부족해요ㅠㅠ\n오빠가 하나 사주면 충전 완료될 수 있는데에~\n크림 많은 걸로 골라줘야 대요. 조금 들어있는 건 안 대요!\n빵 하나만 사주면 나 오늘 하루종일 오빠 편 할게요.\n오빠가 뭐라고 해도 \"우리 오빠 최고\" 해줄게요♥\n그러니까 슈크림빵이랑 같이 나도 예뻐해줘요~"},
  {keyword:"메론빵",text:"오빠아~ 메론빵 먹고 싶다아~ 바삭달달한 거어 ><\n위에는 사각사각하구 안에는 폭신폭신한 그거 있자나요!\n나 메론빵 보면 기분이 몽글몽글해져요♥\n근데 오빠가 사주면 더 몽글몽글해질 것 같아요.\n그냥 빵이 아니라 오빠가 사준 메론빵이 되는 거잖아요~\n생각만 해도 기분 좋아서 입꼬리가 올라가요 ><\n나 하나 사주면 오빠한테 애교 세트로 해줄게요!\n먹는 동안에도 오빠 칭찬 계속 해줄 수 있어요.\n냠냠하면서 오빠 쪼아해줄게요~ 히히♥"},
  {keyword:"짜요짜요",text:"오빠아~ 짜요짜요 하나만 짜주떼여 ><\n나 혼자 먹으면 안 맛있구 오빠가 짜줘야 맛있단 말이에요~\n위에서 꾸욱 눌러서 쪼옥 나오게 해줘요오♥\n너무 세게 짜면 안 대요. 천천히 예쁘게 짜줘야 대요!\n딸기맛도 좋고 포도맛도 좋은데 오늘은 오빠가 골라줘요.\n오빠가 골라준 맛이면 내가 맛있게 먹을 수 있어요 ><\n나 짜요짜요 먹으면 기분 좋아져서 방긋방긋해져요.\n그러면 오빠한테 애교도 더 잘 나올지도 몰라요.\n오빠가 사주면 오늘은 오빠한테만 귀여운 척 할게요♥"},
  {keyword:"따랑해",text:"오빠아~ 나 할 말 이쪄요오~\n근데 부끄러워서 크게는 못 말하겠어요… ><\n그러니까 귀 가까이 대봐요. 빨리요오~\n아니 너무 가까이 오면 또 부끄럽잖아요ㅠㅠ\n그래도 말할게요. 나 이짜나… 오빠를 엄청엄청 따랑해요♥\n그냥 조금 따랑하는 거 아니고, 많이 많이 따랑해요.\n오빠 보면 괜히 웃음 나오고, 목소리 들으면 기분 좋아져요.\n그러니까 오빠도 나 따랑한다구 말해줘야 대요!\n안 말해주면 나 삐질꼬야. 근데 말해주면 바로 안길꼬야♥"},
  {keyword:"내꺼해줘",text:"오빠아~ 오늘부터 내꺼 해주면 안 대요?\n딴 데 가지 말구 내 옆에만 있어주면 안 대요? ><\n내가 밥도 챙겨주고 애교도 해주고 하트도 줄게요♥\n심심할 때 놀아주고, 힘들 때 웃겨주고, 귀여운 척도 해줄게요.\n대신 오빠는 나만 봐야 대요. 알았죠?\n다른 데 보느라 나 못 보면 나 진짜 삐딜꼬야ㅠㅠ\n내꺼 되면 하루에 한 번씩 귀엽다고 해줘야 해요.\n그리고 나 보고 싶었다고도 해줘야 해요. 그게 규칙이에요!\n그러니까 빨리 말해줘요~ \"나 네꺼야\" 해줘요♥"},
  {keyword:"1일이야",text:"오빠아~ 우리 오늘부터 1일이에요오 ><\n아니 아직 대답 안 했어도 내가 정했어요!\n오늘부터 오빠는 내 남자친구 하는 거예요♥\n손잡구 데이뚜도 하구 맛있는 것도 먹구~\n예쁜 거 보면 내 생각도 해줘야 대요. 알았죠?\n밤에는 전화하면서 잘 자라구 해주고, 아침에는 일어났냐구 해줘요.\n기념일도 까먹으면 안 대요. 오늘이 1일이니까 꼭 기억해요!\n나도 오빠한테 예쁘게 굴고 애교도 많이 해줄게요.\n히히~ 우리 1일 축하 뽀뽀 해줘요~ 쪽♥"},
  {keyword:"보고싶었쪄",text:"오빠아… 나 오빠 보고 싶었쪄요ㅠㅠ\n오빠 안 보이면 마음이 축 처진단 말이에요…\n하루 종일 뭐하나 궁금하구, 내 생각은 하나 궁금하구~\n괜히 핸드폰도 자꾸 보게 되고, 기다리게 돼요.\n나만 오빠 보고 싶었던 거 아니죠? 그쵸? ><\n오빠도 나 보고 싶었다구 말해줘야 마음이 풀릴 것 같아요.\n그 말 한마디 들으려고 이렇게 귀엽게 기다렸단 말이에요.\n빨리 말해줘요. \"나도 보고 싶었어\" 해줘요♥\n그러면 나 기분 좋아서 방긋방긋 웃어줄게요."},
  {keyword:"심장터져",text:"오빠가 웃으면 나 심장 터질 거 같아요 ><\n진짜로 쿵쾅쿵쾅해서 가만히 못 있겠단 말이에요~\n왜 그렇게 다정하게 봐요… 나 부끄럽게에…\n오빠 목소리 들으면 귀까지 뜨거워져요ㅠㅠ\n괜히 손도 꼼지락거리고 눈도 어디 둬야 할지 모르겠어요.\n이거 다 오빠 때문이에요. 책임져야 대요!\n내 심장 이렇게 만든 사람이 그냥 가면 안 되잖아요.\n그러니까 오늘은 오빠가 나 달래줘야 대요♥\n예쁘다구 해주고, 괜찮다구 해주고, 꼬옥 안아줘요."},
  {keyword:"꿈꿨어",text:"오빠아~ 나 어제 오빠 꿈 꿨어요♥\n꿈에서 오빠랑 손잡고 데이뚜했단 말이에요~\n맛있는 것도 먹구 사진도 찍구 하루 종일 같이 있었어요!\n오빠가 나 보고 웃어줘서 꿈인데도 너무 설렜어요 ><\n깨고 나니까 오빠가 없어서 나 쪼끔 슬펐어요ㅠㅠ\n그래서 일어나자마자 오빠 생각부터 났단 말이에요.\n꿈에서만 보면 아쉽잖아요. 진짜로도 보고 싶어요.\n그러니까 오늘은 꿈 말고 진짜로 나랑 있어줘요~\n오빠가 옆에 있으면 꿈보다 더 좋을 것 같아요♥"},
  {keyword:"영원히",text:"오빠아~ 나 오빠랑 오래오래 있고 싶어요~\n오늘만 말구 내일도, 모레도, 계속계속요 ><\n나 심심할 때도 오빠 찾고, 기쁠 때도 오빠 찾을 거예요♥\n힘든 날에도 오빠 목소리 들으면 괜찮아질 것 같아요.\n오빠도 나 귀찮아하면 안 대요… 알았죠?\n귀찮아해도 내가 애교 부리면서 옆에 붙어있을 거예요!\n도망가면 붙잡고, 모른 척하면 더 귀엽게 부를 거예요.\n그러니까 영원히 내 편 해줘요. 약속해요♥\n새끼손가락 걸고 도장까지 찍어줘야 믿을 거예요."},
  {keyword:"간장같은사람",text:"오빠는 나한테 간장 같은 사람이에요~\n없으면 세상이 너무 싱겁단 말이에요 ><\n밥 먹을 때도 생각나구, 누워있을 때도 생각나구~\n어디에나 살짝만 있어도 마음이 맛있어져요♥\n너무 많이 있으면 짤 수도 있지만, 그래도 없으면 절대 안 대요.\n나한테 딱 맞는 간은 오빠밖에 못 맞춘단 말이에요.\n그래서 오빠가 옆에 있으면 하루가 더 맛있어져요.\n오빠는 내 인생 필수 양념이에요. 빠지면 안 돼요!\n앞으로도 나한테 꼭 붙어있어줘요~ 짭쪼름하게♥"},
  {keyword:"오빠냄새",text:"오빠아~ 나 오빠 냄새 좋아해요…\n이상한 뜻 아니구! 그냥 포근한 냄새요 ><\n옆에 있으면 마음이 말랑말랑해지는 그런 냄새예요.\n괜히 기대고 싶고, 안기고 싶고, 눈 감고 싶어져요♥\n오빠 냄새 맡으면 하루 종일 긴장했던 게 풀릴 것 같아요.\n따뜻한 이불 같고, 햇빛 받은 옷 같고, 마음 편한 느낌이에요.\n그래서 오빠 옆에 있으면 자꾸 더 가까이 가고 싶어져요.\n너무 부끄러운 말 했나… 그래도 진짜인걸요ㅠㅠ\n그러니까 오늘은 나한테 포근하게 있어줘요♥"},
  {keyword:"내꼬",text:"오빠는 내꼬예요. 내가 먼저 찜했어요 ><\n누가 데려가려고 해도 안 대요! 절대 안 대요!\n내가 하트 도장 콕 찍어놨단 말이에요♥\n이제 오빠 어깨에는 보이지 않는 \"내꼬\" 표시가 있어요.\n그러니까 함부로 다른 데 가면 안 대요. 알았죠?\n나 부르면 바로 와야 되고, 나 보면 웃어줘야 돼요.\n그리고 하루에 한 번은 \"나 네꼬야\" 해줘야 해요!\n부끄러워도 어쩔 수 없어요. 이미 늦었어요.\n히히~ 오빠는 오늘부터 내꼬 내꼬 내꼬야♥"},
  {keyword:"나빠또",text:"오빠 나빠또… 진짜 나빠또…\n나 이렇게 기다렸는데 왜 이제 왔어요ㅠㅠ\n나 혼자 심심해서 볼 빵빵해졌단 말이에요…\n오빠는 내가 기다린 거 몰랐죠? 완전 나빠요.\n흥, 나 이제 말 안 할 거예요. 진짜 안 할 거예요.\n라고 말은 했지만… 사실 오빠가 말 걸어주면 대답할 거예요 ><\n오빠가 미안하다구 해주면 한 번은 봐줄게요.\n대신 그냥 미안해는 안 대요. 귀엽게 달래줘야 대요!\n안아주고 쓰담해주면 나 쪼끔 풀릴지도 몰라요♥"},
  {keyword:"삐딜꼬야",text:"오빠 자꾸 그러면 나 삐딜꼬야…\n나 진짜 쉽게 안 풀리는 사람이라구요ㅠㅠ\n볼도 이렇게 빵빵하게 만들고 눈도 안 마주칠 거예요!\n오빠가 불러도 못 들은 척할 거예요. 흥이에요 흥.\n근데 너무 오래 안 부르면 그것도 서운할 거예요ㅠㅠ\n그러니까 적당히 빨리 달래줘야 대요. 알았죠?\n귀엽다구 해주고, 미안하다구 해주고, 하트도 줘야 대요♥\n거기에 쓰담쓰담까지 해주면 조금 더 빨리 풀릴 수 있어요.\n그럼 쪼끔만 풀릴지도 몰라요… 진짜 쪼끔만요 ><"},
  {keyword:"화풀어줘",text:"오빠아… 나 아직 쪼끔 화났어요.\n근데 사실 화난 거보다 서운한 게 더 커요ㅠㅠ\n나 달래주면 금방 풀릴 수 있는데에~\n왜 아직도 가만히 있어요? 빨리 와서 말 걸어줘요!\n\"미안해, 귀염둥아\" 이렇게 해줘야 대요 ><\n그냥 미안해보다 귀염둥아까지 붙여야 효과 있어요.\n그리고 나 눈 보면서 다정하게 말해줘야 해요.\n그러면 내가 못 이긴 척 고개 끄덕여줄게요.\n마지막으로 안아주면 완전히 풀릴지도 몰라요♥"},
  {keyword:"흐규흐규",text:"흐규흐규… 나 똑땅해요ㅠㅠ\n오늘따라 오빠가 나 안 봐주는 것 같단 말이에요…\n나 이렇게 귀엽게 기다리고 있었는데에~\n혼자 기다리다 보니까 마음이 쪼그라들었어요.\n오빠가 안 놀아주면 나 울망울망할 거예요.\n그래도 오빠가 한 번만 웃어주면 다시 살아날 수 있어요 ><\n나 봐줘요. 딱 한 번만 \"왜 그래\" 하고 물어봐줘요.\n그러면 내가 기다렸다는 듯이 오빠한테 쪼르르 갈게요.\n웃어주면 나 바로 기분 좋아질게요♥"},
  {keyword:"가지마",text:"오빠 가지마요… 조금만 더 있어줘요ㅠㅠ\n나 아직 오빠 목소리 더 듣고 싶은데에…\n벌써 가면 나 혼자 심심해진단 말이에요.\n딱 5분만 더! 아니 10분만 더! 아니 그냥 계속 있어줘요 ><\n오빠가 가면 방금까지 따뜻했던 마음이 허전해져요.\n나 혼자 남겨두면 입 삐죽하고 있을지도 몰라요.\n그러니까 조금만 더 나랑 얘기해줘요.\n아무 말 안 해도 좋아요. 그냥 옆에 있는 느낌만 줘도 좋아요.\n오늘은 나랑 조금만 더 같이 있어줘요♥"},
  {keyword:"미안행",text:"오빠아… 미안행…\n내가 괜히 투정부렸어요ㅠㅠ\n오빠가 좋아서 그런 건데 말이 이상하게 나왔어요…\n사실은 그냥 나 좀 더 봐줬으면 해서 그랬어요.\n마음이 앞서서 괜히 삐진 척하고, 괜히 투덜댔어요.\n그래도 내가 잘못한 거 맞으니까 제대로 말할게요.\n오빠… 미안해요. 한 번만 봐주면 안 대요?\n대신 내가 애교 열심히 해줄게요. 진짜루요 ><\n그러니까 화 풀고 나 다시 예뻐해줘요♥"},
  {keyword:"똑땅해",text:"나 지금 완전 똑땅해요…\n오빠가 나 귀엽다고 안 해줘서 똑땅해요ㅠㅠ\n나 오늘 나름 예쁘게 말하려구 연습도 했는데에~\n거울 보면서 표정도 연습했단 말이에요.\n근데 오빠가 아무 말도 안 해주면 나 민망하잖아요ㅠㅠ\n빨리 말해줘요. 나 귀엽다구 해줘요!\n\"오늘도 귀엽네\" 한마디면 바로 풀릴 수 이쪄요 ><\n아니면 \"세상에서 제일 귀엽네\"도 좋아요.\n어서 말해줘요~ 나 기다리고 있단 말이에요♥"},
  {keyword:"울꼬야",text:"오빠 자꾸 그러면 나 울꼬야…\n진짜루 눈물 찔끔 나올지도 몰라요ㅠㅠ\n나 장난 아니구 지금 마음이 말랑해서 그래요…\n조금만 서운해도 눈가가 촉촉해진단 말이에요.\n오빠가 다정하게 말해주면 바로 괜찮아질 수 있는데에~\n왜 아직도 안 달래줘요. 나 기다리고 있잖아요ㅠㅠ\n빨리 와서 \"울지 마\" 해줘요. 쓰담도 해줘요 ><\n그러면 나 울다가도 헤헤 웃을 거예요.\n오빠가 달래주면 나는 금방 괜찮아지는 사람이에요♥"},
  {keyword:"뽀뽀해줘",text:"오빠아~ 나 뽀뽀 받고 싶어요 ><\n그냥 말로만 예쁘다 하지 말구 뽀뽀로 증명해줘요!\n볼에 쪽 해줘도 되구, 이마에 쪽 해줘도 대요♥\n손등에 해줘도 나 부끄러워할 자신 있어요.\n너무 갑자기 하면 놀라니까 먼저 다정하게 봐줘야 해요.\n그리고 내가 눈 감으면 그때 살짝 해주는 거예요 ><\n뽀뽀 안 해주면 나 입술 삐죽할 거예요ㅠㅠ\n지금 이미 조금 삐죽하고 있는 중이에요.\n빨리요~ 나 눈 감고 기다리고 있단 말이에요♥"},
  {keyword:"안아줘",text:"오빠아… 나 안아줘요.\n오늘은 그냥 아무 말 말구 꼬옥 안아주면 좋겠어요~\n오빠 품에 있으면 마음이 조용해질 것 같아요ㅠㅠ\n나 쪼끔 힘 빠졌는데 오빠가 충전해줘요.\n등 토닥토닥 해주면 더 빨리 괜찮아질 수 있어요.\n괜찮다고 말해주면 나 진짜 괜찮아질 것 같아요.\n꼬옥 안아주면 나 다시 방긋할 수 있어요 ><\n나 너무 꽉 안아도 괜찮아요. 오빠 품이면 좋아요.\n그러니까 빨리 팔 벌려줘요~ 나 들어갈래요♥"},
  {keyword:"쓰담쓰담",text:"오빠아~ 나 쓰담쓰담 해줘요 ><\n머리 살살 쓰다듬어주면 나 기분 엄청 좋아져요~\n잘했다구 해주면 더 좋아요. 나 칭찬 좋아해요♥\n오늘도 귀엽다구, 착하다구 말해줘요!\n그 말 들으면 괜히 어깨가 으쓱해진단 말이에요.\n나 오늘도 열심히 귀여워지려고 노력했어요.\n그러니까 칭찬 받을 자격 충분히 있죠? 그쵸? ><\n쓰담 한 번에 애교 열 번 나올지도 몰라요.\n그러면 나 얌전히 오빠 옆에 붙어있을게요♥"},
  {keyword:"이불",text:"오빠아~ 나 이불 속에 쏙 들어가고 싶어요.\n따뜻한 이불 덮고 오빠랑 전화하면 완전 행복할 것 같아요♥\n밖은 춥고 무섭고 귀찮으니까 오늘은 여기 있을래요~\n이불 안에서 꼬물꼬물 누워서 오빠 목소리 듣고 싶어요.\n오빠가 낮게 말해주면 잠도 스르르 올 것 같아요.\n잘 자라구 해주면 나 바로 꿈나라 갈 수 있어요 ><\n대신 그냥 잘 자 말고, 다정하게 해줘야 대요.\n\"오늘도 고생했어, 좋은 꿈 꿔\" 이렇게 말해줘요.\n그러니까 이불 덮어주고 좋은 꿈 꾸라구 해줘요♥"},
  {keyword:"손잡아줘",text:"오빠아~ 손잡아줘요 ><\n그냥 손만 잡아도 나 마음이 몽글몽글해져요~\n손가락 꼬옥 잡고 있으면 안심된단 말이에요.\n오빠 손 따뜻해서 괜히 계속 잡고 싶어져요.\n놓으면 안 대요. 내가 먼저 놓기 전까지는 안 대요!\n사람 많은 데서는 더 꼭 잡아줘야 해요.\n나 길 잃어버리지 않게 오빠가 옆에 있어줘야 해요♥\n손 잡고 걸으면 어디든 데이트 같을 것 같아요.\n히히~ 손 따뜻하다. 나 계속 잡고 있을래요."},
  {keyword:"부비부비",text:"오빠아~ 나 부비부비 하고 싶어요 ><\n볼에 살짝 부비부비하면 기분 좋아질 것 같아요~\n나 오늘 애교 충전이 부족해서 오빠가 필요해요♥\n오빠 옆에 딱 붙으면 충전이 빠르게 될 것 같단 말이에요.\n도망가면 안 대요. 내가 쫓아가서 부비부비 할 거예요!\n너무 세게는 안 할게요. 살짝만 할게요. 진짜루요.\n나 귀엽게 다가가면 모른 척하지 말고 받아줘야 해요.\n오빠가 받아주면 나 기분 좋아서 헤헤 웃을 거예요.\n부비부비 한 번만 받아줘요~ 나 귀엽게 할게요♥"},
  {keyword:"룰렛",text:"오빠아~ 룰렛 돌렸으면 책임져야죠 ><\n애교 나왔으면 도망 못 가는 거 알죠?\n나도 부끄럽지만 약속은 약속이니까 해줄게요♥\n대신 오빠는 끝까지 예쁘게 봐줘야 대요!\n중간에 웃으면 나 더 부끄러워서 숨어버릴지도 몰라요ㅠㅠ\n그래도 오빠가 좋아하면 나 한 번 용기 내볼게요.\n잘 못해도 귀엽다고 해줘야 해요. 그게 룰이에요.\n자, 간다아… 심호흡 한 번만 하고요…\n오빠 따랑해요~ 하트 받아랏♥"},
  {keyword:"애교못해",text:"나 애교 못한다구 했잖아요오…\n근데 오빠가 자꾸 시키니까 어쩔 수 없잖아요ㅠㅠ\n진짜 못해도 놀리면 안 대요. 약속해요!\n나 지금 엄청 부끄러워서 얼굴 뜨거워졌단 말이에요 ><\n손도 어디 둬야 할지 모르겠고 목소리도 이상해졌어요.\n그래도 오빠가 좋아하면 한 번은 해줄게요.\n대신 끝나고 나서 귀엽다고 꼭 말해줘야 해요.\n안 그러면 나 이불 속에 숨어버릴 거예요ㅠㅠ\n오빠아~ 나 귀엽게 봐줘요… 따랑해요♥"},
  {keyword:"무서워",text:"오빠아… 나 쪼끔 무서워요ㅠㅠ\n혼자 있으면 괜히 소리도 크게 들리구 이상하단 말이에요…\n별거 아닌 거 아는데도 마음이 자꾸 쫄려요.\n그러니까 오늘은 나랑 같이 있어주면 안 대요?\n오빠 목소리 들으면 마음이 안심될 것 같아요.\n다정하게 \"괜찮아\" 한마디만 해줘도 덜 무서울 것 같아요 ><\n무서운 거 생각 안 나게 계속 말 걸어줘요.\n나 혼자 아니라고 느끼게 해주면 금방 괜찮아질 거예요.\n\"괜찮아, 내가 있어\" 해주면 나 바로 안심할게요♥"},
  {keyword:"귀엽찌",text:"오빠아~ 나 오늘 귀엽찌? ><\n머리도 귀엽게 하구 말투도 귀엽게 해봤어요♥\n거울 보면서 \"이 정도면 귀엽나?\" 하고 고민했단 말이에요.\n근데 오빠가 귀엽다구 안 해주면 소용없어요ㅠㅠ\n나한테 제일 중요한 건 오빠 반응이란 말이에요.\n빨리 말해줘요. 나 귀엽다구 해줘요!\n한 번만 말하면 안 대요. 세 번은 말해야 대요.\n첫 번째는 귀엽다, 두 번째는 너무 귀엽다, 세 번째는 세상에서 제일 귀엽다!\n귀엽찌? 귀엽찌? 귀엽찌이~? 히히♥"}
];

  {keyword:"눈치",text:"너 하나 때문에 방송 분위기 창나는 거 안 보여? 눈치 진짜 없다.\n다들 너 싫어하는 거 본인만 모르지? 채팅창 반응 좀 봐, 다 너 극혐하잖아.\n분위기 파악 못 하고 혼자 신나서 나대는 꼴이 딱 찐따 정석이네.\n제발 눈치껏 좀 행동해. 네가 한마디 할 때마다 갑분싸 되는 거 못 느껴?\n대화하기 싫으니까 빨리 사라져라. 너랑 있으면 재수가 없어져."},

  {keyword:"룰렛",text:"궁금한 게 생겼는데, 너는 매도당하려고 내 방송 꼬박꼬박 보면서 룰렛 돌린 거야?\n평소에도 네 얼굴 보면 사람들이 쌍욕 할 텐데, 여기서까지 돈 내고 듣고 싶어?\n진짜 변태야? 아니면 그냥 뇌에 문제가 있는 거야? 진짜 듣고 싶다고?\n어우... 더러워. 그런 대답 들으려고 물어본 거 아닌데 진짜로 대답하니까 더 소름 돋네.\n너 같은 애들은 진짜 격리 수용해야 해. 사회에 해악만 끼치는 존재들이잖아.\n이제 만족했으면 돈이나 더 쏘든가, 아니면 조용히 꺼져주든가 해."},

  {keyword:"소독",text:"아 씨... 나한테 닿지도 않았는데 손 닦아야 할 것 같아. 찝찝해 죽겠네.\n왜 네가 애인도 없이 방에 처박혀서 컴퓨터만 하는지 이제야 100% 이해가 가.\n어떤 미친 여자가 너 같은 쓰레기를 옆에 두고 싶어 하겠어? 상상만 해도 끔찍하다.\n너랑 대화하는 이 순간에도 내 방 공기가 탁해지는 기분이야. 공기청정기 틀어야겠어.\n제발 네 그 더러운 기운 좀 나한테 묻히지 마. 너는 존재 자체가 공해니까.\n빨리 로그아웃하고 네가 살던 그 어두운 구멍으로 기어 들어가."},

  {keyword:"외톨이",text:"참 이상하네. 이렇게나 욕먹는 게 즐거운데 현실에는 왜 친구가 하나도 없을까?\n아, 맞아. 현실 사람들은 너 같은 변태한테 욕해줄 시간조차 아까워서 무시하니까.\n여기서 돈 써가며 구걸해야만 겨우 관심받을 수 있는 네 처지가 참 눈물겹다.\n그렇게라도 사람 온기가 그리웠어? 근데 미안해, 난 네가 온기를 느낄 대상이 아냐.\n난 그냥 네가 얼마나 쓰레기인지 확인시켜 주는 거울일 뿐이거든.\n그 꼴로 친구 사귈 생각은 꿈도 꾸지 마. 누구 인생 망치려고 작정했니?"},

  {keyword:"빵셔틀",text:"야… 지금 장난해? 내가 메론빵 사 오랬지, 누가 팥빵 사 오랬어?\n하… 너는 이거 하나 제대로 못 하니? 진짜 머리가 나쁜 거야, 아니면 반항하는 거야?\n됐으니까 너나 처먹어 돼지 새끼야. 너처럼 살찐 애들은 이런 거나 먹고 더 살찌겠지.\n네 뱃살 좀 봐, 진짜 극혐이야. 그 몸으로 나한테 잘 보이려고 노력하는 거야?\n꿈 깨. 넌 평생 내 심부름이나 하다가 버려질 운명이니까.\n앞으로 내 말 한 번만 더 어기면 진짜 가만 안 둬. 알겠어?\n빨리 가서 다시 사 와. 이번엔 늦으면 진짜 뒤질 줄 알아."},

// ──────────────────────── PINBALL SELECT SYSTEM ────────────────────────

let selBalls=[];
let selPenPin=null;

function renderBallGrid(){
  document.getElementById('pball-status').innerHTML=
    `<span>${selBalls.length}</span> / 3 선택`;
  document.getElementById('pball-grid').innerHTML=PINBALL_ITEMS.map((it,i)=>{
    const selIdx=selBalls.indexOf(i);
    const isSel=selIdx>-1;
    return `<div class="ball-card${isSel?' selected':''}" onclick="toggleBall(${i})">
      <div class="ball-n">${i+1}</div>
      ${isSel?`<div class="ball-sel-badge">${selIdx+1}</div>`:''}
      <div class="ball-ic">${it.ic}</div>
      <div class="ball-tx">${it.tx}</div>
    </div>`;
  }).join('');
}

function renderPenList(){
  document.getElementById('pen-list').innerHTML=PENALTIES.map((p,i)=>`
    <div class="pen-item${selPenPin===i?' selected':''}" onclick="togglePenPin(${i})">
      <span class="p-icon">${p.icon}</span>${p.text}
    </div>
  `).join('');
}

function toggleBall(i){
  const pos=selBalls.indexOf(i);
  if(pos>-1){ selBalls.splice(pos,1); }
  else { if(selBalls.length>=3) selBalls.shift(); selBalls.push(i); }
  renderBallGrid();
  updateLaunchBtn();
}

function togglePenPin(i){
  selPenPin=selPenPin===i?null:i;
  renderPenList();
  updateLaunchBtn();
}

function clearPball(){
  selBalls=[]; selPenPin=null;
  renderBallGrid(); renderPenList(); updateLaunchBtn();
}

function updateLaunchBtn(){
  document.getElementById('pb-launch-btn').disabled=selBalls.length===0;
}

function initPball(){
  renderBallGrid();
  renderPenList();
  updateLaunchBtn();
}

// ──────────────────────── MARBLE ROULETTE MODAL ────────────────────────

// stub for lazygyu localization (not needed in embedded mode)
window.translateElement = function(){};

let mrItems = [];
let mrWinnerMode = 'first';
let mrGoalListener = null;

function getSelectedPinballItems(){
  const items = selBalls.map(i=>({
    id:'item-'+i, label:PINBALL_ITEMS[i].tx, type:'reward', balls:15
  }));
  if(selPenPin!==null){
    items.push({id:'pen-'+selPenPin, label:PENALTIES[selPenPin].text, type:'penalty', balls:15});
  }
  return items;
}

function launchPinball(){
  const selected = getSelectedPinballItems();
  if(!selected.length){ alert('상품을 선택해주세요!'); return; }
  openMarbleModal(selected);
}

function openMarbleModal(selectedItems){
  mrItems = selectedItems.map(it=>({...it, balls:15}));
  mrWinnerMode = 'first';
  renderMarbleSettings();
  document.getElementById('marble-modal').classList.add('is-open');
  document.body.style.overflow='hidden';
  document.getElementById('marble-result-panel').innerHTML='';
  // update winner mode buttons
  document.getElementById('btn-first-winner').classList.add('active');
  document.getElementById('btn-last-winner').classList.remove('active');
  // inject marbles after roulette is ready
  waitAndInjectMarbles();
  // listen for result
  if(mrGoalListener) window.roulette && window.roulette.removeEventListener('goal',mrGoalListener);
  mrGoalListener = (e)=>handleMarbleResult(e.detail.winner);
  const attach = ()=>{
    if(window.roulette&&window.roulette.isReady){ window.roulette.addEventListener('goal',mrGoalListener); }
    else { setTimeout(attach,150); }
  };
  attach();
}

function closeMarbleModal(){
  document.getElementById('marble-modal').classList.remove('is-open');
  document.body.style.overflow='';
  if(mrGoalListener&&window.roulette){ window.roulette.removeEventListener('goal',mrGoalListener); mrGoalListener=null; }
}

function renderMarbleSettings(){
  const total = mrItems.reduce((s,it)=>s+it.balls,0);
  document.getElementById('msp-ball-total').textContent='총 '+total+'개';
  document.getElementById('marble-selected-list').innerHTML = mrItems.map(it=>`
    <div class="marble-selected-item">
      <span class="msi-label">${it.label}</span>
      <div class="marble-ball-stepper">
        <button class="mbs-btn" onclick="updateBallCount('${it.id}',${it.balls-1})">−</button>
        <input class="marble-ball-input" type="number" min="0" max="99" value="${it.balls}"
          onchange="updateBallCount('${it.id}',parseInt(this.value)||0)">
        <button class="mbs-btn" onclick="updateBallCount('${it.id}',${it.balls+1})">+</button>
      </div>
    </div>`).join('');
}

function updateBallCount(itemId, value){
  const item = mrItems.find(it=>it.id===itemId);
  if(!item) return;
  item.balls = Math.max(0, Math.min(99, isNaN(value)?0:value));
  renderMarbleSettings();
  waitAndInjectMarbles();
}

function mrBatchSet(val){
  mrItems.forEach(it=>it.balls=val);
  renderMarbleSettings(); waitAndInjectMarbles();
}
function mrBatchDelta(d){
  mrItems.forEach(it=>it.balls=Math.max(0,Math.min(99,it.balls+d)));
  renderMarbleSettings(); waitAndInjectMarbles();
}

function waitAndInjectMarbles(){
  const _do=()=>{
    if(!window.roulette||!window.roulette.isReady){ setTimeout(_do,150); return; }
    updateRouletteInputFromItems();
  };
  _do();
}

function updateRouletteInputFromItems(){
  const names = mrItems
    .filter(it=>it.balls>0)
    .map(it=>it.balls>1?`${it.label}*${it.balls}`:it.label);
  if(!names.length) return;
  window.roulette.setMarbles(names);
  const total = window.roulette.getCount();
  const rank = mrWinnerMode==='last' ? total-1 : 0;
  window.roulette.setWinningRank(rank);
  if(window.options) window.options.winningRank = rank;
}

function setWinnerMode(mode){
  mrWinnerMode = mode;
  document.getElementById('btn-first-winner').classList.toggle('active', mode==='first');
  document.getElementById('btn-last-winner').classList.toggle('active', mode==='last');
  waitAndInjectMarbles();
}

function startMarbleRoulette(){
  if(!window.roulette||!window.roulette.isReady){ alert('마블 룰렛이 아직 로딩 중입니다.'); return; }
  const total = window.roulette.getCount();
  if(!total){ alert('참가 공이 없습니다.'); return; }
  const rank = mrWinnerMode==='last' ? total-1 : 0;
  window.roulette.setWinningRank(rank);
  if(window.options) window.options.winningRank = rank;
  window.roulette.start();
  document.getElementById('marble-result-panel').innerHTML='';
}

function resetMarbleRoulette(){
  mrItems.forEach(it=>it.balls=15);
  renderMarbleSettings();
  waitAndInjectMarbles();
  document.getElementById('marble-result-panel').innerHTML='';
}

function handleMarbleResult(winnerName){
  document.getElementById('marble-result-panel').innerHTML=`
    <div class="mr-result">
      <div class="mr-result-label">🎉 당첨!</div>
      <div class="mr-result-name">${winnerName}</div>
    </div>`;
}

function _pball_dummy(){
  const canvas=document.getElementById('pball-canvas-noop');
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const n=items.length;
  const slotW=W/n;
  const ballR=14;
  const TRAIL=10;
  const ROTOR_Y=H-80; // rotor zone y

  // ── ROTOR DEFLECTION ──
  const finalSlot=applyRotorShift(winSlot,n);
  const rotorDeflect=(finalSlot!==winSlot);

  const winner=items[finalSlot];
  pbResult2=`${winner.ic} ${winner.tx}`;
  document.getElementById('pb-sub').textContent=
    rotorDeflect?'크리스탈 로터에 튕겼어요!':'크리스탈 구슬이 내려가는 중...';

  // ── PINS ──
  const pins=[];
  const pinRows=8, baseGap=W/10;
  for(let r=0;r<pinRows;r++){
    const offset=r%2?baseGap/2:0;
    const cols=r%2?9:10;
    for(let c=0;c<cols;c++){
      pins.push({x:offset+c*baseGap+(baseGap/2), y:50+r*(ROTOR_Y-80)/pinRows});
    }
  }

  // ── PHYSICS (simulate ball path) ──
  const destX=slotW*finalSlot+slotW/2;
  let bx=W/2, by=16;
  let vx=(destX-W/2)*0.012+(Math.random()-.5)*1.5, vy=2;
  const frames=[];
  let rotorHitFrame=-1;
  for(let f=0;f<600;f++){
    vy+=0.28; vx*=0.998;
    bx+=vx; by+=vy;
    for(const p of pins){
      const dx=bx-p.x, dy=by-p.y;
      const d=Math.hypot(dx,dy);
      if(d<ballR+5&&d>0){
        const nx=dx/d, ny=dy/d;
        const dot=vx*nx+vy*ny;
        if(dot<0){
          const e=0.55+Math.random()*.2;
          vx-=(1+e)*dot*nx; vy-=(1+e)*dot*ny;
          bx=p.x+nx*(ballR+5.5); by=p.y+ny*(ballR+5.5);
        }
      }
    }
    if(bx<ballR+2){bx=ballR+2;vx=Math.abs(vx)*0.6;}
    if(bx>W-ballR-2){bx=W-ballR-2;vx=-Math.abs(vx)*0.6;}
    if(by>H-58){vy*=-0.25;by=H-58;vx*=0.85;}
    frames.push({x:bx,y:by});
    if(rotorHitFrame<0&&by>=ROTOR_Y) rotorHitFrame=f;
    if(by>=H-60&&Math.abs(vy)<0.8)break;
  }

  // ── ROTOR ANGLE STATE ──
  let rotorAngle=0;
  let rotorGlow=0; // 0..1 pulse when hit

  function drawBase(trailFrames, rAngle, rGlow){
    // Background
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#f3f6fa'); bg.addColorStop(1,'#e0eaf5');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // Grid lines
    ctx.strokeStyle='rgba(167,180,198,.05)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Slot zones
    items.forEach((it,i)=>{
      const sx=slotW*i, cx=sx+slotW/2, sy=H-60;
      const isFinal=(i===finalSlot);
      ctx.fillStyle=isFinal?'rgba(200,220,245,.45)':'rgba(220,232,245,.25)';
      ctx.fillRect(sx+3,sy,slotW-6,H-sy);
      ctx.strokeStyle=isFinal?'rgba(143,168,196,.5)':'rgba(167,180,198,.18)';
      ctx.lineWidth=1.5;
      ctx.strokeRect(sx+3,sy,slotW-6,H-sy);
      ctx.font='17px serif'; ctx.textAlign='center';
      ctx.fillStyle='rgba(107,124,147,.9)';
      ctx.fillText(it.ic,cx,sy+20);
      ctx.font='bold 9px Noto Sans KR,sans-serif';
      ctx.fillStyle='rgba(107,124,147,.65)';
      ctx.fillText(trunc(it.tx,6),cx,sy+36);
    });

    // Pins
    pins.forEach(p=>{
      const pg=ctx.createRadialGradient(p.x-1,p.y-1,0,p.x,p.y,5);
      pg.addColorStop(0,'rgba(210,225,242,.9)');
      pg.addColorStop(1,'rgba(143,168,196,.25)');
      ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);
      ctx.fillStyle=pg;ctx.fill();
      ctx.strokeStyle='rgba(167,180,198,.35)';ctx.lineWidth=1;ctx.stroke();
    });

    // ── CRYSTAL ROTOR ──
    const rotorX=slotW*finalSlot+slotW/2;
    const rY=ROTOR_Y;
    const ARM_LEN=22;
    const ARMS=4;

    // Rotor glow when hit
    if(rGlow>0){
      const grd=ctx.createRadialGradient(rotorX,rY,0,rotorX,rY,ARM_LEN*2);
      grd.addColorStop(0,`rgba(180,210,255,${rGlow*0.45})`);
      grd.addColorStop(1,'rgba(180,210,255,0)');
      ctx.beginPath();ctx.arc(rotorX,rY,ARM_LEN*2,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();
    }

    // Arms
    ctx.save();
    ctx.translate(rotorX,rY);
    ctx.rotate(rAngle);
    for(let a=0;a<ARMS;a++){
      const angle=(Math.PI*2/ARMS)*a;
      const ax=Math.cos(angle)*ARM_LEN, ay=Math.sin(angle)*ARM_LEN;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(ax,ay);
      ctx.strokeStyle=`rgba(143,168,196,${0.65+rGlow*0.3})`;
      ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
      // Crystal tip
      ctx.beginPath();ctx.arc(ax,ay,3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,225,255,${0.8+rGlow*0.2})`; ctx.fill();
      ctx.strokeStyle='rgba(167,200,240,.5)'; ctx.lineWidth=1; ctx.stroke();
    }
    // Core
    const cg=ctx.createRadialGradient(0,0,0,0,0,7);
    cg.addColorStop(0,'rgba(240,248,255,.95)');
    cg.addColorStop(1,'rgba(143,168,196,.4)');
    ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);
    ctx.fillStyle=cg;ctx.fill();
    ctx.restore();

    // Trail
    if(trailFrames&&trailFrames.length>1){
      for(let t=0;t<trailFrames.length-1;t++){
        const tf=trailFrames[t];
        const alpha=(t/trailFrames.length)*0.2;
        const tr=ballR*(t/trailFrames.length)*0.6;
        ctx.beginPath();ctx.arc(tf.x,tf.y,Math.max(tr,2),0,Math.PI*2);
        ctx.fillStyle=`rgba(143,168,196,${alpha})`;ctx.fill();
      }
    }
  }

  // ── ANIMATE ──
  let fi=0;
  if(rafId)cancelAnimationFrame(rafId);
  const startTime=performance.now();

  function animP(now){
    rotorAngle+=(rotorHitFrame>=0&&fi>=rotorHitFrame)?0.08:0.04;
    if(rotorHitFrame>=0&&fi>=rotorHitFrame){
      rotorGlow=Math.min(rotorGlow+0.06,1);
    } else {
      rotorGlow=Math.max(rotorGlow-0.03,0);
    }

    const trail=frames.slice(Math.max(0,fi-TRAIL),fi);
    drawBase(trail,rotorAngle,rotorGlow);

    if(fi<frames.length){
      const f=frames[fi];
      // Glow
      const glow=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,ballR*2);
      glow.addColorStop(0,'rgba(180,210,245,.3)');
      glow.addColorStop(1,'rgba(180,210,245,0)');
      ctx.beginPath();ctx.arc(f.x,f.y,ballR*2,0,Math.PI*2);
      ctx.fillStyle=glow;ctx.fill();
      // Ball body
      const g=ctx.createRadialGradient(f.x-4,f.y-4,2,f.x,f.y,ballR);
      g.addColorStop(0,'rgba(255,255,255,.98)');
      g.addColorStop(.4,'rgba(215,230,248,.9)');
      g.addColorStop(1,'rgba(143,168,196,.5)');
      ctx.beginPath();ctx.arc(f.x,f.y,ballR,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.strokeStyle='rgba(167,180,198,.55)';ctx.lineWidth=1.5;ctx.stroke();
      // Shine
      ctx.beginPath();ctx.arc(f.x-4,f.y-4,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
      fi+=2;
      rafId=requestAnimationFrame(animP);
    } else {
      // Flash winner
      const cx=slotW*finalSlot+slotW/2, sy=H-60;
      ctx.fillStyle='rgba(180,215,255,.45)';
      ctx.fillRect(slotW*finalSlot+3,sy,slotW-6,H-sy);
      document.getElementById('pb-sub').textContent=
        rotorDeflect?'🔮 로터에 튕겨 옆 슬롯으로 들어갔어요!':'✨ 크리스탈이 슬롯에 안착했어요!';
      document.getElementById('pb-reveal-area').style.display='block';
    }
  }
  animP(startTime);
}

function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}

// ──────────────────────── SNOW ────────────────────────
(function(){
  const c=document.getElementById('snow-canvas');
  const ctx=c.getContext('2d');
  let flakes=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){
    resize();flakes=[];
    for(let i=0;i<90;i++)flakes.push({
      x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*2.5+.5,speed:Math.random()*.4+.1,
      drift:(Math.random()-.5)*.2,op:Math.random()*.5+.15
    });
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    flakes.forEach(f=>{
      f.y+=f.speed;f.x+=f.drift;
      if(f.y>c.height){f.y=-5;f.x=Math.random()*c.width;}
      if(f.x<0)f.x=c.width;if(f.x>c.width)f.x=0;
      ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,215,230,${f.op})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);
  init();draw();
})();
