<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핀볼 게임 · MEYOU RADIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Gowun+Batang:wght@400;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Cafe24+Ssurround&display=swap" rel="stylesheet">
<script type="importmap">{"imports":{"14w6b":"./roulette/kubin.f3647b70.png","9F06a":"./roulette/chamru.d6926a56.png","aRf6a":"./roulette/waldokun.7e88dd59.png","ao29o":"./roulette/Box2D.simd.8f5913cc.js","b21ls":"./roulette/Box2D.b9b16b27.wasm","dRxiZ":"./roulette/Box2D.742de2ae.js","g5g75":"./roulette/ff.7fdc9e82.svg","h5gW1":"./roulette/junyoop.d27f0cbf.png","huS8a":"./roulette/kkwak.673a610d.png","ikqOI":"./roulette/Box2D.simd.dd31b167.wasm"}}</script>
<link rel="stylesheet" href="./roulette/lazygyu-roulette.891d671b.css">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css?v=3">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/pinball.css?v=38">
</head>
<body>
<nav class="g-nav">
  <a class="g-nav-brand" href="index.html">MEYOU RADIO</a>
  <div class="g-nav-links">
    <a class="g-nav-link " href="ladder.html">🌻 사다리</a>
    <a class="g-nav-link nav-active " href="pinball.html">🌻 핀볼</a>
    <a class="g-nav-link " href="reaction.html">🌻 리액션</a>
  </div>
  <a class="g-nav-brand" href="index.html">MEYOU RADIO</a>
</nav>
<canvas id="snow-canvas" style="display:none"></canvas>

<main class="sub-page-wrap">
  <!-- 고양이 장식 -->
  <div class="pinball-cat-deco" aria-hidden="true">
    <img class="pinball-cat pinball-cat-left" src="assets/pinball/cat-left.png" alt="" onerror="this.style.display='none'">
    <img class="pinball-cat pinball-cat-right" src="assets/pinball/cat-right.png" alt="" onerror="this.style.display='none'">
  </div>

  <!-- 섹션 헤더: SOS 핀볼 게임 이미지 타이틀 -->
  <div class="section-head">
    <img class="pball-main-title" src="assets/pinball/pb-title-sos.png" alt="SOS 핀볼 게임" onerror="this.style.display='none'">
    <div class="pball-title-sub">공을 발사해 상품을 획득하라!</div>
  </div>

  <!-- 히어로 영역 -->
  <div class="pball-hero">
    <div class="pball-hero-board">
      <img class="hero-corner hero-corner-tl" src="assets/pinball/pb-corner.png" aria-hidden="true" onerror="this.style.display='none'">
      <img class="hero-corner hero-corner-tr" src="assets/pinball/pb-corner.png" aria-hidden="true" onerror="this.style.display='none'">
      <div class="pb-panel-tagline">✦ MEYOU PINBALL ✦</div>
      <div class="pball-hero-steps">
        <div class="pball-step-card">
          <span class="step-card-num">01</span>
          <span class="step-card-label">🎁 상품 선택</span>
          <span class="step-card-desc">원하는 상품을<br>최대 3개 골라요</span>
        </div>
        <div class="pball-step-arrow">→</div>
        <div class="pball-step-card">
          <span class="step-card-num">02</span>
          <span class="step-card-label">⚡ 벌칙 선택</span>
          <span class="step-card-desc">꽝 항목을<br>최대 1개 설정해요</span>
        </div>
        <div class="pball-step-arrow">→</div>
        <div class="pball-step-card">
          <span class="step-card-num">03</span>
          <span class="step-card-label">🎱 핀볼 발사!</span>
          <span class="step-card-desc">공을 쏴서<br>상품 칸에 넣어요</span>
        </div>
      </div>
      <img class="hero-divider" src="assets/pinball/pb-divider.png" aria-hidden="true" onerror="this.style.display='none'">
      <button class="btn-pball-start" onclick="openPballStep(1)">🎱 핀볼 시작!</button>
    </div>
  </div>
</main>

<!-- ══ STEP 1 : 상품 선택 ══ -->
<div class="pball-step-modal" id="pball-step1">
  <div class="pball-modal-backdrop" onclick="closePballModal()"></div>
  <div class="pball-modal-shell">
    <div class="pball-modal-header">
      <div class="pball-step-nav">
        <span class="step-dot active">1</span>
        <span class="step-line"></span>
        <span class="step-dot">2</span>
        <span class="step-line"></span>
        <span class="step-dot">3</span>
      </div>
      <div class="pball-modal-title">🎁 상품 선택</div>
      <button class="pball-modal-close" onclick="closePballModal()">✕</button>
    </div>
    <div class="pball-modal-body">
      <div class="pball-pick-info">최대 <b>3개</b> 선택 후 다음 단계로!</div>
      <div class="ball-grid" id="pball-grid"></div>
    </div>
    <div class="pball-modal-footer">
      <div class="pball-sel-count" id="pball-status"><span>0</span> / 3 선택됨</div>
      <div class="pball-footer-btns">
        <button class="pb-ghost-btn" onclick="clearPball()">초기화</button>
        <button class="btn-pball-next" id="btn-step1-next" onclick="openPballStep(2)" disabled>벌칙 선택 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ STEP 2 : 벌칙 선택 ══ -->
<div class="pball-step-modal" id="pball-step2">
  <div class="pball-modal-backdrop" onclick="closePballModal()"></div>
  <div class="pball-modal-shell pball-step2-shell">
    <div class="pball-modal-header">
      <div class="pball-step-nav">
        <span class="step-dot done">✓</span>
        <span class="step-line done"></span>
        <span class="step-dot active">2</span>
        <span class="step-line"></span>
        <span class="step-dot">3</span>
      </div>
      <img class="step2-penalty-badge" src="assets/pinball/pb-penalty-badge.png" alt="벌칙" onerror="this.outerHTML='<div class=\'pball-modal-title\'>⚡ 벌칙 선택</div>'">
      <button class="pball-modal-close" onclick="closePballModal()">✕</button>
    </div>
    <div class="pball-modal-body">
      <div class="pball-pick-info">최대 <b>1개</b> 선택 · 없어도 발사 가능!</div>
      <div class="pen-grid" id="pen-list"></div>
    </div>
    <div class="pball-modal-footer">
      <button class="pb-ghost-btn" onclick="openPballStep(1)">← 상품 다시 선택</button>
      <button class="btn-pball-launch" onclick="launchPinball()">
        <img src="assets/pinball/pb-btn-launch.png" alt="발사" class="btn-launch-img" onerror="this.parentElement.innerHTML='🎱 핀볼 발사!'">
      </button>
    </div>
  </div>
</div>

<!-- ══ MARBLE ROULETTE MODAL (Step 3) ══ -->
<div class="marble-modal" id="marble-modal">
  <div class="marble-modal-backdrop" id="marble-modal-backdrop"></div>
  <div class="marble-modal-shell">
    <div class="marble-modal-header">
      <span class="marble-modal-title">🔮 미유 마블 룰렛</span>
      <button class="marble-modal-close" id="marble-modal-close-btn">✕</button>
    </div>
    <div class="marble-modal-body">
      <div class="marble-roulette-frame">
        <div class="marble-roulette-host" id="marble-roulette-canvas-host"></div>
      </div>
      <div class="marble-settings-panel">
        <div class="msp-section-title">선택 항목 & 공 개수</div>
        <div class="marble-selected-list" id="marble-selected-list"></div>
        <div class="msp-ball-total" id="msp-ball-total">총 0개</div>
        <div class="msp-batch-row">
          <button class="msp-batch-btn" onclick="mrBatchSet(15)">전체 15</button>
          <button class="msp-batch-btn" onclick="mrBatchDelta(1)">전체 +1</button>
          <button class="msp-batch-btn" onclick="mrBatchDelta(-1)">전체 -1</button>
        </div>
        <div class="msp-section-title" style="margin-top:14px;">당첨 기준</div>
        <div class="msp-winner-row">
          <button class="msp-winner-btn active" id="btn-first-winner" onclick="setWinnerMode('first')">First</button>
          <button class="msp-winner-btn" id="btn-last-winner" onclick="setWinnerMode('last')">Last</button>
        </div>
        <div class="msp-actions">
          <button class="btn-primary" id="mr-start-btn" onclick="startMarbleRoulette()">▶ 시작</button>
          <button class="pb-ghost-btn" onclick="resetMarbleRoulette()">초기화</button>
        </div>
        <div class="marble-result-panel" id="marble-result-panel"></div>
        <div class="msp-notice">© lazygyu (MIT) — <a href="licenses/lazygyu-roulette-LICENSE" target="_blank" style="color:inherit;opacity:.6;">라이선스</a></div>
      </div>
    </div>
  </div>
</div>
<script type="module" src="./roulette/lazygyu-roulette.24bcefaf.js"></script>
<script src="js/pinball.js?v=9"></script>
</body>
</html>
