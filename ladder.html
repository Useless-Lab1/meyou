<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사다리 타기 · 미유라디오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Gowun+Batang:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nanum+Myeongjo:wght@400;700&family=Cafe24+Ssurround&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css?v=2">
<link rel="stylesheet" href="css/base.css?v=2">
<link rel="stylesheet" href="css/components.css?v=3">
<link rel="stylesheet" href="css/animations.css?v=2">
<link rel="stylesheet" href="css/ladder.css?v=64">
</head>
<body>

<div class="ladder-bg" aria-hidden="true"></div>

<nav class="g-nav">
  <a class="g-nav-brand" href="index.html">MEYOU RADIO</a>
  <div class="g-nav-links">
    <a class="g-nav-link nav-active" href="ladder.html">사다리</a>
    <a class="g-nav-link" href="pinball.html">핀볼</a>
    <a class="g-nav-link" href="reaction.html">리액션</a>
  </div>
  <a class="g-nav-brand" href="index.html">MEYOU RADIO</a>
</nav>

<main class="ladder-page-wrap">
  <div class="section-head">
    <div class="section-orn">LADDER GAME</div>
    <div class="section-title-main">미유 사다리</div>
  </div>

  <div class="ladder-stage">
    <div class="tier-row" id="tier-row"></div>
  </div>
  <div class="ladder-notice">
    휴방권/방종권은 기념일 혹은 이벤트날 사용 불가 !&nbsp;&nbsp;유통기한은 한달, 그 후로는 소멸 !&nbsp;&nbsp;전 사다리 하위 메뉴 선택 가능 !
  </div>
</main>

<!-- ══ TIER MODAL ══ -->
<div class="tier-modal-overlay" id="tier-modal" style="display:none;" onclick="handleModalBgClick(event)">
  <div class="tier-modal-box" id="tier-modal-box">
    <img class="modal-vine-deco" src="assets/ladder/modal-vine-top.png" alt="" aria-hidden="true">
    <button class="tier-modal-close" onclick="closeTierModal()">✕</button>
    <div class="tier-modal-title" id="tm-title">1426</div>
    <div class="tier-modal-sub" id="tm-sub">상품 3개 선택 후 벌칙 2개 선택</div>

    <div class="step-tabs">
      <div class="step-tab active" id="tab-items">
        <img src="assets/ladder/step-icon-items.png" class="step-tab-icon" alt="" aria-hidden="true">
        <span>상품 선택</span>
      </div>
      <div class="step-tab" id="tab-penalty">
        <img src="assets/ladder/step-icon-penalty.png" class="step-tab-icon" alt="" aria-hidden="true">
        <span>벌칙 선택</span>
      </div>
      <div class="step-tab" id="tab-ladder">
        <img src="assets/ladder/step-icon-ladder.png" class="step-tab-icon" alt="" aria-hidden="true">
        <span>사다리</span>
      </div>
    </div>

    <!-- 상품 선택 -->
    <div id="section-items">
      <div class="sel-status"><span id="items-status">0 / 0 선택</span><button class="btn-ghost" onclick="clearItems()">초기화</button></div>
      <div class="items-grid" id="items-grid"></div>
      <div class="cta-row"><button class="btn-primary" id="btn-to-penalty" onclick="goToStep('penalty')" disabled>다음 →</button></div>
    </div>

    <!-- 벌칙 선택 -->
    <div id="section-penalty" style="display:none;">
      <div class="sel-status"><span id="penalty-status">0 / 0 선택</span><button class="btn-ghost" onclick="clearPenalties()">초기화</button></div>
      <div class="penalty-grid" id="penalty-grid"></div>
      <div class="cta-row">
        <button class="btn-ghost" onclick="goToStep('items')">← 이전</button>
        <button class="btn-primary" id="btn-to-ladder" onclick="goToStep('ladder')" disabled>사다리 타기 →</button>
      </div>
    </div>

    <!-- 사다리 -->
    <div id="section-ladder" style="display:none;">
      <div class="nl-hint" id="nl-hint">번호를 골라 사다리를 타세요</div>
      <div class="nl-numbers-row" id="nl-numbers"></div>
      <div class="nl-board-area" id="nl-board-area" onclick="nlToggleBoardBlur()" style="cursor:pointer;">
        <canvas id="nl-canvas"></canvas>
        <div class="nl-board-cover" id="nl-board-cover">
          <div class="nl-board-cover-label">👆 클릭해서 사다리 보기</div>
        </div>
      </div>
      <div class="nl-items-area" id="nl-items-area" onclick="nlToggleItemsBlur()">
        <div class="nl-items-row" id="nl-items"></div>
        <div class="nl-items-blur-hint" id="nl-items-blur-hint">👆 클릭해서 상품 보기</div>
      </div>
      <div class="nl-ctrl">
        <button class="btn-ghost" onclick="goToStep('penalty')">← 이전</button>
        <button class="btn-primary" id="nl-play-btn" onclick="nlPlay()" disabled>▶ 사다리 타기</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ RESULT OVERLAY ══ -->
<div class="nl-result-overlay" id="nl-result-overlay" style="display:none;">
  <div class="nl-result-wrap">
    <img class="nl-result-char" src="assets/ladder/result-win-character.png" alt="">
    <div class="nl-result-box">
      <div class="nl-confetti-area" id="nl-confetti-area"></div>
      <div class="nl-congrats">🎉 축하합니다!</div>
      <div class="nl-congrats-sub" id="nl-congrats-sub">번호의 당첨 상품</div>
      <div class="nl-win-num" id="nl-win-num">1</div>
      <div class="nl-win-arrow">✦</div>
      <div class="nl-prize-frame-wrap">
        <img class="nl-prize-frame-img" src="assets/ladder/result-prize-frame.png" alt="" aria-hidden="true">
        <div class="nl-win-item" id="nl-win-item">상품명</div>
      </div>
      <div class="nl-all-results" id="nl-all-results"></div>
      <div class="cta-row" style="justify-content:center;">
        <button class="btn-ghost" onclick="nlReset()">🔄 다시 하기</button>
        <button class="btn-ghost" onclick="closeTierModal()">닫기</button>
      </div>
    </div>
  </div>
</div>

<script src="js/ladder.js?v=26"></script>
</body>
</html>
